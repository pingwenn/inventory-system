<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進銷存系統 - 商品列表</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background-color: antiquewhite;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>
    <h1>進銷存系統</h1>

    <div style="background-color: #f9f9f9; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd;">
        <h3>新增商品</h3>
        <form id="addProductForm">
            <input type="text" id="skuInput" placeholder="商品型號" required>
            <input type="text" id="nameInput" placeholder="商品名稱" required>
            <input type="number" id="priceInput" placeholder="價格" required>
            <input type="number" id="stockInput" placeholder="庫存數量" required>
            <button type="submit" style="padding: 5px 10px; background-color: #28a745; color: white; border: none; cursor: pointer;">
                送出新增
            </button>
        </form>
		</div>
		<div id="editSection" style="display: none; background-color: #fff3cd; padding: 15px; margin-bottom: 20px; border: 1px solid #ffeeba;">
		        <h3 style="color: #856404;">編輯商品</h3>
		        <form id="editProductForm">
		            <input type="hidden" id="editId"> 
		            
		            <input type="text" id="editSku" required>
		            <input type="text" id="editName" required>
		            <input type="number" id="editPrice" required>
		            <input type="number" id="editStock" required>
		            
		            <button type="submit" style="padding: 5px 10px; background-color: #ffc107; border: none; cursor: pointer;">
		                儲存修改
		            </button>
		            <button type="button" onclick="cancelEdit()" style="padding: 5px 10px; background-color: #6c757d; color: white; border: none; cursor: pointer;">
		                取消
		            </button>
		        </form>
		    </div>
		
    <table>
        <thead>
            <tr>
                <th>編號</th>
                <th>型號</th>
                <th>名稱</th>
                <th>價格</th>
                <th>庫存</th>
				<th>操作</th>
            </tr>
        </thead>
        <tbody id="productList">
            <tr><td colspan="6">資料載入中...</td></tr>
        </tbody>
    </table>

    <script>
        // 設定呼叫的API網址
        const API_URL = '/api/products';

        // 發送請求的函數
        function fetchProducts(){
            // fetch 專門用來發送網路請求，它會回傳一個 Promise 物件
            fetch(API_URL)
                .then(response => response.json()) // 將回應轉換成 JSON 格式
                .then(data => {
                    renderTable(data); // 呼叫函數來渲染表格
                })
                .catch(error => {
                    console.error('抓取資料失敗：', error);
                    document.getElementById('productList').innerHTML = '<tr><td colspan="5" style="color:red;">連線失敗，請確認後端有啟動！</td></tr>';
                })
        }

        function renderTable(products) {
            const tbody = document.getElementById('productList');
            tbody.innerHTML = ''; // 清空表格內容

            if(products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">沒有商品資料</td></tr>';
                return;
            }

            products.forEach(product => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${product.id}</td>
                    <td>${product.sku}</td>
                    <td>${product.name}</td>
                    <td>${product.price}</td>
                    <td>${product.stock}</td>
					<td>
						<button onclick="openEditForm(${product.id}, '${product.sku}', '${product.name}', ${product.price}, ${product.stock})" style="background-color: #ffc107; border: none; padding: 5px; border-radius: 3px; cursor: pointer; margin-right: 5px;">
                            編輯
                        </button>
						<button onclick="deleteProduct(${product.id})" style="background-color: #dc3545; color: white; border: none; padding: 5px; border-radius: 3px; cursor: pointer;">
							刪除
						</button>
					</td>
					
                `;
                tbody.appendChild(tr);
            });
        }
		
		// 刪除商品的函數
		function deleteProduct(id){
			if(!confirm('確定要刪除這個商品嗎？')){
				return; // 使用者按「取消」就直接結束
			}
			
			// 呼叫後端的DELETE API,網址後面要加上id
			fetch(`${API_URL}/${id}`,{
				method: 'DELETE' // 刪除動作
			})
			.then(response => {
				if(response.ok){
					alert('商品已成功刪除');
					fetchProducts(); // 重新到後端撈最新資料，刷新表格
				} else {
					alert('刪除失敗')
				}
			})
			.catch(error  => console.error('錯誤：', error));
		}
		
		// 打開編輯表單，並把舊資料塞進去
        function openEditForm(id, sku, name, price, stock) {
            document.getElementById('editSection').style.display = 'block'; // 顯示編輯區塊
            
            // 把傳進來的資料，填入對應的格子裡
            document.getElementById('editId').value = id;
            document.getElementById('editSku').value = sku;
            document.getElementById('editName').value = name;
            document.getElementById('editPrice').value = price;
            document.getElementById('editStock').value = stock;
        }

        // 取消編輯，把表單藏起來
        function cancelEdit() {
            document.getElementById('editSection').style.display = 'none';
        }

        // 送出修改資料 (PUT 請求)
        document.getElementById('editProductForm').addEventListener('submit', function(event) {
            event.preventDefault(); // 阻止重新整理

            const id = document.getElementById('editId').value; // 抓出剛剛偷偷存起來的 ID
            
            const updatedProduct = {
                sku: document.getElementById('editSku').value,
                name: document.getElementById('editName').value,
                price: parseFloat(document.getElementById('editPrice').value),
                stock: parseInt(document.getElementById('editStock').value)
            };

            // 發送 PUT 請求給後端
            fetch(`${API_URL}/${id}`, {
                method: 'PUT', 
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(updatedProduct)
            })
            .then(response => {
                if(response.ok) {
                    alert('商品修改成功');
                    cancelEdit(); // 隱藏表單
                    fetchProducts(); // 刷新表格
                } else {
                    alert('修改失敗');
                }
            })
            .catch(error => console.error('錯誤:', error));
        });

        fetchProducts(); // 頁面載入時呼叫函數來抓取資料

        // 處理表單送出
        document.getElementById('addProductForm').addEventListener('submit', function(event) {
            event.preventDefault(); // 阻止網頁預設的重新整理行為

            // 1. 把格子裡填寫的資料抓出來，打包成一個 JavaScript 物件
            const newProduct = {
                sku: document.getElementById('skuInput').value,
                name: document.getElementById('nameInput').value,
                price: parseFloat(document.getElementById('priceInput').value), // 轉成小數/數字
                stock: parseInt(document.getElementById('stockInput').value)    // 轉成整數
            };

            // 2. 呼叫 fetch 來發送 POST 請求 (之前在終端機打的 curl 指令)
            fetch(API_URL, {
                method: 'POST', // 指定動作是新增
                headers: {
                    'Content-Type': 'application/json' // 告訴後端：傳的是 JSON
                },
                body: JSON.stringify(newProduct) // 把 JavaScript 物件翻譯成 JSON 字串
            })
            .then(response => {
                if(response.ok) {
                    alert('商品新增成功');
                    document.getElementById('addProductForm').reset(); // 清空格子
                    fetchProducts(); // 重新去後端抓一次最新資料，刷新表格
                } else {
                    alert('新增失敗，請檢查後端是否有錯誤。');
                }
            })
            .catch(error => console.error('錯誤:', error));
        });

    </script>
</body>
</html>
